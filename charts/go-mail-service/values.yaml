# Default values for go-mail-service.

# -- Log level for the service (debug, info, warn, error)
logLevel: "info"

# -- Default outbound sender identity used when the request does not override From
sender:
  address: ""
  name: ""

# -- HTTP server settings
http:
  port: 8080

# -- SMTP server settings
smtp:
  port: 587
  # -- Hostname advertised in EHLO
  domain: ""
  auth:
    required: true
    username: ""
    # -- SMTP password. In production, leave empty and pre-create the K8s Secret instead.
    password: ""
    secret:
      # -- Name of the K8s Secret containing the SMTP password (key: password)
      name: "smtp-secret"
      # -- Path inside the container where the secret is mounted
      mountPath: "/secrets/smtp"
  tls:
    enabled: false
    certFile: ""
    keyFile: ""
  service:
    # -- ClusterIP (internal only) or LoadBalancer (external).
    # A separate Service is created when type is not ClusterIP.
    type: ClusterIP
    # -- Annotations for the SMTP service (e.g. cloud LB annotations)
    annotations: {}

# -- Mail provider configuration.
# Enable exactly one provider. Priority if multiple are enabled: mailjet > sendgrid > noop.
provider:
  mailjet:
    enabled: false
    # -- Mailjet API keys. In production, leave empty and pre-create the K8s Secret instead.
    apiKeyPublic: ""
    apiKeyPrivate: ""
    secret:
      # -- Name of the K8s Secret (keys: apiKeyPublic, apiKeyPrivate)
      name: "mailjet-secret"
      # -- Mount path inside the container
      mountPath: "/secrets/mailjet"
  sendgrid:
    enabled: false
    # -- SendGrid API key. In production, leave empty and pre-create the K8s Secret instead.
    apiKey: ""
    secret:
      # -- Name of the K8s Secret (key: apiKey)
      name: "sendgrid-secret"
      # -- Mount path inside the container
      mountPath: "/secrets/sendgrid"
  # -- Noop provider logs mail without sending. No secrets required.
  noop:
    enabled: false

replicaCount: 1

image:
  repository: ghcr.io/jo-hoe/go-mail-service
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default: chart appVersion)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# -- Main ClusterIP service (exposes both http and smtp ports internally)
service:
  enabled: true
  type: ClusterIP

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
